name: Validate Repository

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "chore/**"
      - "docs/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository
        run: python scripts/ci/validate_repo.py
